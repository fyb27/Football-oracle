server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA + HashRouter: any unknown path falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache fingerprinted assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
