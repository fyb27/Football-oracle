# Runs the full stack locally: API on :4000, web on :8080.
# Usage: docker compose up --build
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      CORS_ORIGIN: "*"
      DB_PATH: "/app/data/football-oracle.db"
      AUTO_SEED: "true"
    volumes:
      - oracle-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # The browser calls the backend directly. For local Docker this is the
        # host-mapped backend port. Change to your deployed API in production.
        VITE_API_URL: "http://localhost:4000"
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  oracle-data:
